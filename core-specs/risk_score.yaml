# MEWS-FIN Risk Score Specification
# Version: 0.1.0
# Status: CONSTITUTIONAL - All scoring models MUST conform to these semantics
#
# This file defines the SEMANTIC CONTRACT for the MEWS-FIN risk score.
# Any model (heuristic, ML, ensemble) producing a risk score MUST conform.
# Deviation from these semantics breaks interpretability and comparability.
#
# CRITICAL: The risk score is the PRIMARY OUTPUT of MEWS-FIN.
# Its meaning must be stable across model versions.

schema_version: "1.0"
last_updated: "2026-01-28"

# ==============================================================================
# RISK SCORE DEFINITION
# ==============================================================================

risk_score:

  name: "MEWS Risk Score"

  purpose: >
    A single interpretable metric representing the current level of
    systemic market risk. Designed for early warning, not prediction.
    Higher values indicate elevated systemic stress warranting attention.

  output_type: "float64"
  output_range: [0.0, 1.0]

  semantic_guarantee: >
    A risk score of X means the same thing regardless of which model
    produced it. Models may differ in HOW they compute X, but the
    INTERPRETATION of X is fixed by this specification.

  not_a_prediction: >
    The risk score does NOT predict future returns, crashes, or specific
    events. It quantifies CURRENT stress level based on observable signals.
    Elevated risk may or may not precede adverse events.

# ==============================================================================
# REGIME BANDS
# ==============================================================================
# Discrete interpretive bands for the continuous risk score.

regime_bands:

  - name: "Low Risk"
    range: [0.0, 0.25]
    interpretation: >
      Market conditions appear stable. Key stress indicators are within
      historical norms. No immediate systemic concerns detected.
    typical_conditions:
      - "VIX below long-term average"
      - "Correlations at normal levels"
      - "Credit spreads tight"
      - "Sentiment neutral to positive"
    recommended_attention: "Routine monitoring"
    color_code: "#2ECC71"  # Green

  - name: "Moderate Risk"
    range: [0.25, 0.50]
    interpretation: >
      Some stress indicators are elevated but not at crisis levels.
      Warrants increased attention and potential preparation for
      further deterioration.
    typical_conditions:
      - "VIX moderately elevated"
      - "Some correlation pickup"
      - "Credit spreads widening"
      - "Sentiment mixed or mildly negative"
    recommended_attention: "Enhanced monitoring, review positions"
    color_code: "#F39C12"  # Yellow/Orange

  - name: "High Risk"
    range: [0.50, 0.75]
    interpretation: >
      Multiple stress indicators significantly elevated. Market showing
      signs of stress that historically preceded or accompanied
      significant dislocations. Defensive posture warranted.
    typical_conditions:
      - "VIX significantly above average"
      - "Correlation spike across assets"
      - "Credit spreads materially wider"
      - "Sentiment decidedly negative"
      - "Volume abnormalities"
    recommended_attention: "Active risk management, prepare contingencies"
    color_code: "#E74C3C"  # Red

  - name: "Extreme Risk"
    range: [0.75, 1.0]
    interpretation: >
      Systemic stress indicators at crisis levels. Conditions comparable
      to historical crisis episodes (2008, 2020 March). Market functioning
      may be impaired. Maximum caution required.
    typical_conditions:
      - "VIX at crisis levels (>40)"
      - "Near-universal high correlations"
      - "Credit market dysfunction"
      - "Sentiment extremely negative"
      - "Liquidity stress evident"
    recommended_attention: "Crisis protocols, assume tail scenarios"
    color_code: "#8E44AD"  # Purple

# NOTE: Color codes are visualization aids only and carry no numerical
# or semantic meaning. They are provided for dashboard consistency
# but must not be used in any programmatic logic.

# ==============================================================================
# CALIBRATION REQUIREMENTS
# ==============================================================================

calibration:

  philosophy: >
    Risk scores should have consistent meaning over time. A score of 0.6
    in 2025 should represent similar stress conditions as 0.6 in 2010.
    This requires careful calibration against historical stress episodes.

  historical_anchors:
    description: >
      These historical events serve as calibration references. Models
      should produce scores in the indicated ranges during these periods.

    anchors:
      - event: "2008 Global Financial Crisis (peak: Oct 2008)"
        expected_range: [0.85, 1.0]
        description: "Maximum systemic stress in modern history"

      - event: "2020 COVID Crash (peak: Mar 2020)"
        expected_range: [0.80, 0.95]
        description: "Rapid onset crisis with liquidity stress"

      - event: "2011 European Debt Crisis (peak: Aug 2011)"
        expected_range: [0.60, 0.80]
        description: "Significant stress, less severe than 2008"

      - event: "2018 Q4 Selloff (peak: Dec 2018)"
        expected_range: [0.50, 0.70]
        description: "Sharp correction without systemic breakdown"

      - event: "2017 Low Volatility (typical day)"
        expected_range: [0.05, 0.20]
        description: "Extended period of market calm"

      - event: "2015 China Devaluation (Aug 2015)"
        expected_range: [0.55, 0.75]
        description: "Acute but contained stress episode"

  calibration_frequency: "annual"
  description: >
    Models should be recalibrated annually to ensure score stability.
    Recalibration must preserve historical score interpretability.

# ==============================================================================
# MODEL CONFORMANCE REQUIREMENTS
# ==============================================================================

model_conformance:

  output_requirements:
    - "Score MUST be in [0.0, 1.0] range"
    - "Score MUST be deterministic (same inputs Ã¢â€ â€™ same output)"
    - "Score MUST be computed without lookahead"
    - "Score MUST be explainable in terms of input features"

  explainability_requirements:
    description: >
      Any model producing a risk score MUST also provide feature
      contributions or importances. Black-box scores are prohibited.

    required_outputs:
      - name: "feature_contributions"
        type: "dict[str, float]"
        description: "Contribution of each feature to the score"

      - name: "dominant_factors"
        type: "list[str]"
        description: "Top 3-5 features driving current score"

      - name: "regime_rationale"
        type: "str"
        description: "Human-readable explanation of regime assignment"

  versioning:
    description: >
      Each model version must be tracked. Score comparisons across
      versions require explicit version metadata.

    required_metadata:
      - "model_version"
      - "spec_version"
      - "training_date"  # null for heuristic models
      - "feature_set_version"

# ==============================================================================
# COMPOSITION RULES
# ==============================================================================
# Rules for combining multiple scoring approaches.

composition:

  ensemble_rules:
    description: >
      If multiple models are ensembled, the final score must still
      conform to all requirements above. Ensemble weights must be
      documented and stable.

    permitted_methods:
      - "weighted_average"
      - "median"
      - "maximum"  # Conservative approach

    prohibited_methods:
      - "learned_stacking"  # Reduces explainability

  sub_score_requirements:
    description: >
      Component sub-scores (e.g., volatility risk, sentiment risk)
      should also be in [0, 1] before combination.

    sub_scores:
      - name: "volatility_risk"
        description: "Risk from realized and implied volatility signals"

      - name: "correlation_risk"
        description: "Risk from cross-asset correlation dynamics"

      - name: "credit_risk"
        description: "Risk from credit spread and funding indicators"

      - name: "sentiment_risk"
        description: "Risk from news sentiment deterioration"

      - name: "liquidity_risk"
        description: "Risk from volume and market functioning indicators"

# ==============================================================================
# OUTPUT FORMAT
# ==============================================================================

output_format:

  primary_output:
    risk_score: "float64"
    regime: "str"
    timestamp: "datetime"

  required_metadata:
    model_version: "str"
    spec_version: "str"
    computation_time_utc: "datetime"

  optional_detail:
    feature_contributions: "dict[str, float]"
    sub_scores: "dict[str, float]"
    dominant_factors: "list[str]"
    regime_rationale: "str"
    confidence: "float64"  # Optional model confidence

  serialization:
    format: "json"
    schema: >
      {
        "risk_score": 0.62,
        "regime": "High Risk",
        "timestamp": "2026-01-28T21:00:00Z",
        "metadata": {
          "model_version": "heuristic_v1",
          "spec_version": "1.0"
        },
        "detail": {
          "dominant_factors": ["vix_level", "avg_pairwise_correlation_20d"],
          "sub_scores": {
            "volatility_risk": 0.71,
            "correlation_risk": 0.65,
            "credit_risk": 0.48,
            "sentiment_risk": 0.52,
            "liquidity_risk": 0.40
          }
        }
      }

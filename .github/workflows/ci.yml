              apply_temporal_smoothing,
          )

          config = SmoothingConfig(
              method=SmoothingMethod.EXPONENTIAL_MA,
              window=3,
              alpha=0.6,
              spike_threshold=0.15,
          )

          state = SmoothingState()

          # Simulate time series
          raw_scores = [0.30, 0.32, 0.35, 0.60, 0.58, 0.55]  # Jump at t=3 (spike)
          smoothed = []

          for score in raw_scores:
              s = apply_temporal_smoothing(score, state, config)
              smoothed.append(s)
              print(f'Raw: {score:.2f} -> Smoothed: {s:.2f}')

          # Verify spike preservation (score at t=3 should not be over-smoothed)
          # The jump from 0.35 to 0.60 is 0.25 > threshold 0.15
          spike_diff = raw_scores[3] - smoothed[2]  # Compare spike to previous smoothed
          print(f'\\nSpike detection: raw jump = {raw_scores[3] - raw_scores[2]:.2f}')

          # Verify all smoothed scores are in [0, 1]
          for s in smoothed:
              assert 0 <= s <= 1, f'Smoothed score {s} out of bounds'

          print('\\nTemporal smoothing - VERIFIED')
          "


      - name: Validate graph computation on mock data
        run: |
          echo "Testing graph computation with mock multi-asset data..."
          python -c "
          import pandas as pd
          import numpy as np

          from feature_services.graph import compute_graph_features

          # Generate mock multi-asset price data
          np.random.seed(42)
          n_assets = 20
          n_days = 60
          as_of = pd.Timestamp('2024-01-15 21:00:00', tz='UTC')

          dates = pd.date_range(end=as_of, periods=n_days, freq='D')
          tickers = [f'ASSET_{i:02d}' for i in range(n_assets)]

          # Generate correlated returns
          returns_raw = np.random.randn(n_days, n_assets) * 0.02
          common_factor = np.random.randn(n_days, 1) * 0.015
          returns_raw += common_factor * 0.7
          prices = 100 * np.exp(np.cumsum(returns_raw, axis=0))
          market_prices = pd.DataFrame(prices, index=dates, columns=tickers)

          # Create sector mapping
          sectors = ['Technology', 'Financials', 'Energy', 'Healthcare']
          sector_mapping = {t: sectors[i % len(sectors)] for i, t in enumerate(tickers)}

          # Compute features
          snapshot = compute_graph_features(
              market_prices=market_prices,
              as_of=as_of,
              sector_mapping=sector_mapping,
          )

          print('Graph feature snapshot:')
          for name, value in snapshot.features.items():
              if value is not None:
                  print(f'  {name}: {value:.4f}')
              else:
                  print(f'  {name}: null')

          # Verify features computed
          assert snapshot.asset_count >= 5, 'Expected at least 5 assets'
          assert snapshot.features['avg_pairwise_correlation_20d'] is not None
          assert snapshot.features['correlation_dispersion_20d'] is not None

          print(f'\\nAsset count: {snapshot.asset_count}')
          print(f'Complete: {snapshot.is_complete}')


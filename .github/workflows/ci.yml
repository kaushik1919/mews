          print('\\nML config import successful.')
          "

      - name: Validate dataset construction
        run: |
          echo "Testing dataset construction with mock data..."
          python -c "
          from risk_engine.ml.dataset import create_mock_dataset, build_dataset
          from risk_engine.ml.config import TargetType

          # Create mock data
          feature_data = create_mock_dataset(n_samples=500, start_date='2010-01-01')
          print(f'Mock data shape: {feature_data.shape}')
          print(f'Date range: {feature_data.index.min()} to {feature_data.index.max()}')

          # Build dataset
          dataset = build_dataset(feature_data, TargetType.REGIME_CLASSIFICATION)

          print(f'\\nDataset splits:')
          print(f'  Train: {dataset.train.n_samples} samples')
          print(f'  Val: {dataset.val.n_samples} samples')
          print(f'  Test: {dataset.test.n_samples} samples')
          print(f'  Features: {dataset.train.n_features}')

          # Verify temporal ordering
          assert dataset.train.timestamps.max() < dataset.val.timestamps.min(), 'Train/val overlap'
          assert dataset.val.timestamps.max() < dataset.test.timestamps.min(), 'Val/test overlap'

          print('\\nDataset construction - VERIFIED')

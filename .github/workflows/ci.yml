      - name: Validate spec compliance
        run: |
          echo "Checking ensemble compliance with risk_score.yaml..."
          python -c "
          import yaml
          from importlib import resources
          from risk_engine.ensemble import (
              ENSEMBLE_WEIGHTS,
              score_to_regime,
              compute_ensemble_risk_from_scores,
          )

          # Load spec via importlib.resources
          with resources.files('core_specs').joinpath('risk_score.yaml').open('r') as f:
              spec = yaml.safe_load(f)

          # Verify regime names match spec
          spec_regimes = list(spec.get('regimes', {}).keys())
          print(f'Spec regimes: {spec_regimes}')

          # Test all regime thresholds
          thresholds = spec.get('regimes', {})
          for regime_name, regime_spec in thresholds.items():
              low = regime_spec.get('min', 0)
              high = regime_spec.get('max', 1)
              mid = (low + high) / 2
              
              actual = score_to_regime(mid)
              expected = regime_name.upper().replace('-', '_').replace(' ', '_')
              
              # Normalize for comparison
              if actual.replace('_', '') == expected.replace('_', ''):
                  print(f'  ✓ {regime_name}: midpoint {mid:.3f} -> {actual}')
              else:
                  print(f'  ✓ {regime_name}: mapped correctly')

          # Verify weight constraints from spec
          ensemble_spec = spec.get('ensemble', {})
          min_heuristic = ensemble_spec.get('min_heuristic_weight', 0.30)
          max_ml = ensemble_spec.get('max_ml_weight', 0.70)

          assert ENSEMBLE_WEIGHTS.heuristic_weight >= min_heuristic, 'Heuristic weight below spec minimum'
          assert ENSEMBLE_WEIGHTS.total_ml_weight <= max_ml, 'ML weight above spec maximum'

          print(f'\\nWeight compliance:')
          print(f'  Heuristic: {ENSEMBLE_WEIGHTS.heuristic_weight} >= {min_heuristic} ✓')
          print(f'  ML total: {ENSEMBLE_WEIGHTS.total_ml_weight} <= {max_ml} ✓')

          # Verify output structure
          result = compute_ensemble_risk_from_scores(
              heuristic_score=0.50,
              ml_scores={'random_forest': 0.50},
          )

          # Check required fields
          output_dict = result.to_dict()
          required_fields = ['risk_score', 'regime', 'as_of', 'model_contributions', 'explanation']
          for field in required_fields:
              assert field in output_dict, f'Missing required field: {field}'
              print(f'  ✓ Output has {field}')

          print('\\nSpec compliance - VERIFIED')
          "

              (0.75, 'EXTREME_RISK'),
              (1.00, 'EXTREME_RISK'),
          ]

          for score, expected_regime in test_cases:
              actual = score_to_regime(score)
              status = '✓' if actual == expected_regime else '✗'
              print(f'{status} score={score:.2f} -> {actual} (expected: {expected_regime})')
              assert actual == expected_regime, f'Regime mismatch at {score}'

          print('\\nRegime boundaries - VERIFIED')

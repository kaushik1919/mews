              EnsembleWeights(
                  heuristic_weight=0.20,  # Below 0.30 minimum
                  primary_ml_weight=0.80,
              )
              assert False, 'Should have raised ValueError'
          except ValueError as e:
              print(f'Correctly rejected low heuristic weight: {e}')

          # Test weights don't sum to 1
          try:
              EnsembleWeights(
                  heuristic_weight=0.30,
                  primary_ml_weight=0.30,
                  secondary_ml_weight=0.30,  # Sum = 0.90
              )
              assert False, 'Should have raised ValueError'
          except ValueError as e:
              print(f'Correctly rejected non-unit weights: {e}')

          print('\\nWeight constraints - VERIFIED')
          "

      - name: Validate ensemble computation
        run: |
          echo "Testing ensemble score computation..."
          python -c "
          from risk_engine.ensemble import (
              compute_weighted_ensemble,
              ENSEMBLE_WEIGHTS,
              score_to_regime,
          )

          # Test ensemble computation
          heuristic_score = 0.55
          ml_scores = {
              'random_forest': 0.65,
              'xgboost': 0.60,
          }

          ensemble, contributions = compute_weighted_ensemble(
              heuristic_score=heuristic_score,
              ml_scores=ml_scores,
              weights=ENSEMBLE_WEIGHTS,
          )

          print(f'Heuristic score: {heuristic_score}')
          print(f'ML scores: {ml_scores}')
          print(f'Ensemble score: {ensemble:.4f}')
          print(f'Contributions: {contributions}')

          # Verify score is in [0, 1]
          assert 0 <= ensemble <= 1, 'Ensemble score out of bounds'

          # Verify contributions sum to ensemble
          contrib_sum = sum(contributions.values())
          assert abs(contrib_sum - ensemble) < 1e-6, 'Contributions do not sum to ensemble'

          # Verify regime mapping
          regime = score_to_regime(ensemble)
          print(f'Regime: {regime}')

          # Expected: 0.35*0.55 + 0.45*0.65 + 0.20*0.60 = 0.1925 + 0.2925 + 0.12 = 0.605
          expected = 0.35*0.55 + 0.45*0.65 + 0.20*0.60
          assert abs(ensemble - expected) < 1e-6, f'Expected {expected}, got {ensemble}'

          print('\\nEnsemble computation - VERIFIED')
          "

      - name: Validate calibration
        run: |
          echo "Testing calibration methods..."
          python -c "
          import numpy as np
          from risk_engine.ensemble.calibration import (
              CalibrationMethod,
              fit_calibrator,
              apply_calibration,
          )

          # Generate mock training data
          np.random.seed(42)
          n = 100
          raw_scores = np.random.uniform(0, 1, n)
          # Create targets with some noise
          targets = (raw_scores > 0.5).astype(int)

          # Test Platt scaling
          print('Testing Platt scaling...')
          calibrator = fit_calibrator(
              raw_scores=raw_scores,
              targets=targets,
              method=CalibrationMethod.PLATT_SCALING,
          )
          print(f'Calibrator method: {calibrator.method.value}')

          # Apply calibration
          test_scores = np.array([0.2, 0.5, 0.8])
          calibrated = np.array([apply_calibration(s, calibrator) for s in test_scores])
          print(f'Raw: {test_scores}')
          print(f'Calibrated: {calibrated}')

          # Verify calibrated scores are in [0, 1]
          assert np.all(calibrated >= 0) and np.all(calibrated <= 1), 'Calibrated scores out of bounds'

          # Test isotonic regression
          print('\\nTesting Isotonic regression...')
          calibrator_iso = fit_calibrator(
              raw_scores=raw_scores,
              targets=targets,
              method=CalibrationMethod.ISOTONIC_REGRESSION,
          )

          calibrated_iso = np.array([apply_calibration(s, calibrator_iso) for s in test_scores])
          print(f'Calibrated (isotonic): {calibrated_iso}')

          # Verify monotonicity (approximately)
          assert calibrated_iso[0] <= calibrated_iso[1] <= calibrated_iso[2], 'Isotonic not monotonic'

          print('\\nCalibration - VERIFIED')
          "

      - name: Validate temporal smoothing
        run: |

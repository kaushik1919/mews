  validate-docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t mews:ci-test .
          echo "Docker build complete."

      - name: Verify image size
        run: |
          echo "Checking Docker image size..."
          SIZE=$(docker image inspect mews:ci-test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB} MB"
          
          # Warn if image exceeds 1.5GB (allow some margin)
          if [ $SIZE_MB -gt 1500 ]; then
            echo "Warning: Image size exceeds 1.5GB target"
          else
            echo "Image size is within target (<1.5GB)"
          fi

      - name: Run container in mock mode
        run: |
          echo "Running MEWS container in mock mode..."
          docker run --rm mews:ci-test --mock --verbose
          echo "Container execution - VERIFIED"

      - name: Test environment variable override
        run: |
          echo "Testing MEWS_MODE environment variable..."
          docker run --rm -e MEWS_MODE=mock mews:ci-test --verbose
          echo "Environment variable override - VERIFIED"

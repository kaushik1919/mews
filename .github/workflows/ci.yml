        run: |
          echo "Testing model comparison..."
          python -c "
          from datetime import date, timedelta
          from risk_engine.evaluation import (
              compare_models,
              quick_compare,
              format_full_report,
          )

          # Create mock scores for each model type
          def generate_mock_scores(base, noise_factor):
              scores = {}
              current = date(2007, 1, 1)
              end = date(2023, 12, 31)
              day_count = 0
              while current <= end:
                  # Vary by day to add some pattern
                  adjustment = (day_count % 30) * 0.005 * noise_factor
                  scores[current] = min(1.0, max(0.0, base + adjustment))
                  current += timedelta(days=1)
                  day_count += 1
              return scores

          heuristic = generate_mock_scores(0.40, 1.0)
          ml = generate_mock_scores(0.45, 0.8)
          ensemble = generate_mock_scores(0.42, 0.6)

          # Quick compare
          quick = quick_compare(heuristic, ml, ensemble, threshold=0.50)
          print('Quick comparison at 0.50:')
          for model, metrics in quick.items():
              print(f'  {model}: score={metrics[\"score\"]:.3f}')

          # Full comparison
          comparison = compare_models(heuristic, ml, ensemble)
          print(f'\\nBest model: {comparison.best_model}')
          print(f'Recommended threshold: {comparison.recommended_threshold}')

          # Generate report (just verify it runs)
          report = format_full_report(comparison)
          assert len(report) > 0, 'Report should not be empty'
          print(f'\\nReport generated: {len(report)} characters')

          print('\\nModel comparison - PASSED')
          "
          
      - name: Validate output structure
        run: |
          echo "Validating output structure..."
          python -c "
          from datetime import date, timedelta
          from risk_engine.evaluation import (
              LeadTimeResult,
              LeadTimeSummary,
              FalsePositiveResult,
              ModelEvaluation,
              ModelComparison,
          )

          # Verify dataclass fields
          lt_result = LeadTimeResult(
              crisis_name='Test Crisis',
              threshold=0.50,
              first_alert_date=date(2020, 1, 1),
              crisis_start_date=date(2020, 2, 1),
              lead_time_days=31,
              detected=True,
          )
          assert lt_result.detected == True
          assert lt_result.lead_time_days == 31
          print('LeadTimeResult structure - OK')

          lt_summary = LeadTimeSummary(
              threshold=0.50,
              results=[lt_result],
              n_detected=1,
              n_missed=0,
              mean_lead_time=31.0,
              median_lead_time=31.0,
              min_lead_time=31,
              max_lead_time=31,
          )
          assert lt_summary.detection_rate == 1.0
          print('LeadTimeSummary structure - OK')

          print('\\nOutput structure validation - PASSED')
          "

  validate-pipeline:
    name: Validate Daily Pipeline (Phase 5A)
    runs-on: ubuntu-latest
    needs: [lint-python]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          
      - name: Import pipeline modules
        run: |
          echo "Verifying pipeline modules can be imported..."
          python -c "
          from pipeline.daily_run import (
              PipelineConfig,
              DEFAULT_CONFIG,
              MOCK_CONFIG,
              PipelineContext,
              create_context,
              run_pipeline,
              run_ingestion,
              run_features,
              run_risk,
              generate_report,
              print_report,
              main,
          )
          print('All pipeline imports successful')
          "
          
      - name: Run pipeline in mock mode
        run: |
          echo "Running pipeline in mock mode..."
          python -m pipeline.daily_run.run --mock --date 2024-01-15
          
      - name: Validate pipeline output structure
        run: |
          echo "Validating pipeline output..."
          python -c "
          from datetime import date
          from pipeline.daily_run import (
              create_context,
              run_pipeline,
              generate_report,
              MOCK_CONFIG,
          )

          # Create context in mock mode
          ctx = create_context(
              run_date=date(2024, 1, 15),
              config=MOCK_CONFIG,
          )

          # Run pipeline
          ctx = run_pipeline(ctx)

          # Validate output
          assert ctx.is_success, f'Pipeline failed: {ctx.errors}'
          assert ctx.risk.final_score is not None, 'No final score'
          assert 0 <= ctx.risk.final_score <= 1, f'Invalid score: {ctx.risk.final_score}'
          assert ctx.risk.regime in ['LOW_RISK', 'MODERATE_RISK', 'HIGH_RISK', 'EXTREME_RISK']
          
          print(f'Final Score: {ctx.risk.final_score:.2f}')
          print(f'Regime: {ctx.risk.regime}')
          print(f'Duration: {ctx.duration_seconds:.2f}s')

          # Validate report generation
          report = generate_report(ctx)
          assert 'MEWS-FIN Daily Risk Report' in report
          assert str(ctx.risk.regime) in report
          print(f'Report length: {len(report)} characters')

          print('\\nPipeline validation - PASSED')
          "
          
      - name: Validate deterministic output
        run: |
          echo "Checking deterministic output..."
          python -c "
          from datetime import date
          from pipeline.daily_run import create_context, run_pipeline, MOCK_CONFIG

          # Run twice with same inputs
          ctx1 = create_context(run_date=date(2024, 1, 15), config=MOCK_CONFIG)
          ctx1 = run_pipeline(ctx1)

          ctx2 = create_context(run_date=date(2024, 1, 15), config=MOCK_CONFIG)
          ctx2 = run_pipeline(ctx2)

          # Scores should match (mock mode is seeded)
          assert ctx1.risk.final_score == ctx2.risk.final_score, 'Scores not deterministic'
          assert ctx1.risk.regime == ctx2.risk.regime, 'Regimes not deterministic'
          
          print(f'Run 1 score: {ctx1.risk.final_score:.4f}')
          print(f'Run 2 score: {ctx2.risk.final_score:.4f}')
          print('Deterministic output - VERIFIED')
          "
          
      - name: Validate CLI interface
        run: |
          echo "Testing CLI interface..."
          python -m pipeline.daily_run.run --mock --quiet --date 2024-01-15
          echo "CLI test - PASSED"

  validate-visualization:
    name: Validate Visualization Module
    runs-on: ubuntu-latest
    needs: [validate-specs, lint-python]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Verify visualization module structure
        run: |
          echo "Verifying visualization module structure..."
          python -c "
          from pathlib import Path
          
          required_files = [
              'visualization/__init__.py',
              'visualization/config.py',
              'visualization/architecture.py',
              'visualization/features.py',
              'visualization/risk.py',
              'visualization/evaluation.py',
              'visualization/captions.py',
              'visualization/run_all.py',
          ]
          
          for f in required_files:
              path = Path(f)
              if not path.exists():
                  print(f'  ✗ Missing: {f}')
                  exit(1)
              print(f'  ✓ Found: {f}')
          
          print('\nVisualization module structure - VERIFIED')
          "
          
      - name: Verify module imports
        run: |
          echo "Verifying visualization imports..."
          python -c "
          import matplotlib
          matplotlib.use('Agg')
          
          from visualization import (
              FIGURES_DIR,
              COLORS,
              SIZES,
              ensure_dirs,
              apply_style,
              generate_all_architecture_plots,
              generate_all_feature_plots,
              generate_all_risk_plots,
              generate_all_evaluation_plots,
              ALL_CAPTIONS,
              get_caption,
          )
          
          print('Visualization imports - VERIFIED')
          "
          
      - name: Generate mock figures
        run: |
          echo "Generating all figures with mock data..."
          python -m visualization.run_all --mock --verbose
          
      - name: Verify generated figures
        run: |
          echo "Verifying generated figures..."
          python -c "
          from pathlib import Path
          
          expected_figures = [
              'figures/architecture/mews_architecture.png',
              'figures/features/volatility_and_drawdown_timeseries.png',
              'figures/features/news_sentiment_vs_market.png',
              'figures/features/avg_correlation_timeseries.png',
              'figures/risk_engine/heuristic_risk_score.png',
              'figures/risk_engine/ml_vs_heuristic_comparison.png',
              'figures/risk_engine/calibration_curve.png',
              'figures/risk_engine/ensemble_vs_components.png',
              'figures/risk_engine/shap_global_importance.png',
              'figures/evaluation/lead_time_bar_chart.png',
              'figures/evaluation/false_positive_rate_by_threshold.png',
              'figures/evaluation/false_alarm_duration.png',
              'figures/demo/daily_risk_snapshot.png',
          ]
          
          missing = []
          for f in expected_figures:
              path = Path(f)
              if not path.exists():
                  missing.append(f)
                  print(f'  ✗ Missing: {f}')
              else:
                  size_kb = path.stat().st_size / 1024
                  print(f'  ✓ Generated: {f} ({size_kb:.1f} KB)')
          
          if missing:
              print(f'\n{len(missing)} figures missing!')
              exit(1)
          
          print(f'\nAll {len(expected_figures)} figures generated successfully')
          "
          
      - name: Verify captions exist
        run: |
          echo "Verifying figure captions..."
          python -c "
          from visualization.captions import ALL_CAPTIONS, get_caption
          
          expected = 13
          actual = len(ALL_CAPTIONS)
          
          print(f'Captions defined: {actual}')
          
          if actual < expected:
              print(f'Warning: Expected at least {expected} captions, got {actual}')
          
          # Test get_caption function
          caption = get_caption('mews_architecture.png')
          if not caption:
              print('Error: get_caption() returned empty for known figure')
              exit(1)
          
          print('Figure captions - VERIFIED')
          "
          
      - name: Test deterministic output
        run: |
          echo "Verifying deterministic figure generation..."
          python -c "
          import matplotlib
          matplotlib.use('Agg')
          
          import hashlib
          from pathlib import Path
          from visualization import ensure_dirs, apply_style
          from visualization.features import generate_all_feature_plots
          
          ensure_dirs()
          apply_style()
          
          # Generate twice
          paths1 = generate_all_feature_plots(mock=True)
          hashes1 = {}
          for p in paths1:
              with open(p, 'rb') as f:
                  hashes1[p.name] = hashlib.md5(f.read()).hexdigest()
          
          paths2 = generate_all_feature_plots(mock=True)
          hashes2 = {}
          for p in paths2:
              with open(p, 'rb') as f:
                  hashes2[p.name] = hashlib.md5(f.read()).hexdigest()
          
          # Compare hashes
          for name in hashes1:
              if hashes1[name] != hashes2[name]:
                  print(f'  ✗ Non-deterministic: {name}')
                  exit(1)
              print(f'  ✓ Deterministic: {name}')
          
          print('\nDeterministic figure generation - VERIFIED')
          "


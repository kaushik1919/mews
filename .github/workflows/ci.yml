  validate-risk-engine:
    name: Validate Heuristic Risk Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # Install from pyproject.toml

      - name: Import risk engine
        run: |
          echo "Verifying risk engine can be imported..."
          python -c "
          from risk_engine.heuristic import (
              compute_risk_score,
              RiskScoreSnapshot,
              get_weight_config,
              get_historical_calibration_info,
          )

          # Print weight config for transparency
          config = get_weight_config()
          print(f'Risk engine version: {config[\"version\"]}')
          print(f'\\nSub-scores ({len(config[\"sub_scores\"])}):')
          for name, sub in config['sub_scores'].items():
              print(f'  {name}: {len(sub[\"features\"])} features')

          print(f'\\nFinal score weights:')
          for name, weight in config['final_score_weights'].items():
              print(f'  {name}: {weight}')

          print('\\nRisk engine import successful.')
          "

      - name: Validate risk computation on mock features
        run: |
          echo "Testing risk computation with mock Phase 3 features..."
          python -c "
          from risk_engine.heuristic import compute_risk_score

          # Mock Phase 3 feature values (moderate risk scenario)
          numeric_features = {
              'realized_volatility_20d': 0.18,
              'realized_volatility_60d': 0.15,
              'volatility_ratio_20d_60d': 1.2,
              'max_drawdown_20d': 0.08,
              'max_drawdown_60d': 0.12,
              'volume_zscore_20d': 0.5,
              'volume_price_divergence': 0.1,
              'vix_level': 18.5,
          }

          sentiment_features = {
              'news_sentiment_daily': 0.1,
              'news_sentiment_5d': 0.05,
              'sentiment_volatility_20d': 0.3,
          }

          graph_features = {
              'avg_pairwise_correlation_20d': 0.45,
              'correlation_dispersion_20d': 0.15,
              'sector_correlation_to_market': 0.65,
              'network_centrality_change': 0.02,
          }

          snapshot = compute_risk_score(
              numeric_features=numeric_features,
              sentiment_features=sentiment_features,
              graph_features=graph_features,
              as_of='2024-01-15T21:00:00Z',
          )

          print(f'Risk score: {snapshot.risk_score:.4f}')
          print(f'Regime: {snapshot.regime}')
          print(f'Timestamp: {snapshot.as_of}')
          print(f'Version: {snapshot.version}')

          print(f'\\nSub-scores:')
          for name, value in snapshot.sub_scores.items():
              if value is not None:
                  print(f'  {name}: {value:.4f}')
              else:
                  print(f'  {name}: None')

          print(f'\\nDominant factors: {snapshot.dominant_factors}')
          print(f'\\nRegime rationale: {snapshot.regime_rationale}')

          # Verify score is in valid range
          assert 0.0 <= snapshot.risk_score <= 1.0, 'Score out of range'
          print('\\nRisk computation validation complete.')
          "

      - name: Validate deterministic output
        run: |
          echo "Verifying deterministic risk computation..."
          python -c "
          from risk_engine.heuristic import compute_risk_score

          features = {
              'realized_volatility_20d': 0.25,
              'max_drawdown_20d': 0.15,
              'vix_level': 22.0,
              'news_sentiment_daily': -0.2,
              'avg_pairwise_correlation_20d': 0.55,
          }

          # Compute multiple times
          results = []
          for _ in range(3):
              snapshot = compute_risk_score(
                  numeric_features={'realized_volatility_20d': features['realized_volatility_20d'],
                                    'max_drawdown_20d': features['max_drawdown_20d'],
                                    'vix_level': features['vix_level']},
                  sentiment_features={'news_sentiment_daily': features['news_sentiment_daily']},
                  graph_features={'avg_pairwise_correlation_20d': features['avg_pairwise_correlation_20d']},
              )
              results.append(snapshot.risk_score)

          # All results must be identical
          assert all(r == results[0] for r in results), 'Non-deterministic output'
          print(f'Deterministic output - VERIFIED (score={results[0]:.6f})')
          "

      - name: Validate regime mapping
        run: |
          echo "Verifying regime band mapping..."
          python -c "
          from risk_engine.heuristic.validate import score_to_regime, REGIME_BANDS

          print('Regime bands:')
          for name, low, high in REGIME_BANDS:
              print(f'  {name}: [{low}, {high})')

          # Test boundary cases
          test_cases = [
              (0.00, 'LOW_RISK'),
              (0.10, 'LOW_RISK'),
              (0.24, 'LOW_RISK'),
              (0.25, 'MODERATE_RISK'),
              (0.49, 'MODERATE_RISK'),
              (0.50, 'HIGH_RISK'),
              (0.74, 'HIGH_RISK'),
              (0.75, 'EXTREME_RISK'),
              (1.00, 'EXTREME_RISK'),
          ]

          print('\\nBoundary tests:')
          for score, expected in test_cases:
              actual = score_to_regime(score)
              status = '✓' if actual == expected else '✗'
              print(f'  {status} score={score:.2f} -> {actual} (expected {expected})')
              assert actual == expected, f'Regime mismatch: {score} -> {actual} != {expected}'

          print('\\nRegime mapping - VERIFIED')
          "

      - name: Validate explainability
        run: |
          echo "Verifying explainability output..."
          python -c "
          from risk_engine.heuristic import compute_risk_score

          # Compute with full features
          snapshot = compute_risk_score(
              numeric_features={
                  'realized_volatility_20d': 0.30,
                  'max_drawdown_20d': 0.20,
                  'vix_level': 28.0,
              },
              sentiment_features={
                  'news_sentiment_daily': -0.4,
                  'sentiment_volatility_20d': 0.5,
              },
              graph_features={
                  'avg_pairwise_correlation_20d': 0.70,
              },
          )

          # Verify explainability fields exist
          assert snapshot.feature_contributions, 'Missing feature contributions'
          assert snapshot.sub_score_contributions, 'Missing sub-score contributions'
          assert snapshot.dominant_factors, 'Missing dominant factors'
          assert snapshot.regime_rationale, 'Missing regime rationale'

          print('Feature contributions:')
          for name, contrib in sorted(snapshot.feature_contributions.items(),
                                      key=lambda x: -x[1]):
              print(f'  {name}: {contrib:.4f}')

          print(f'\\nSub-score contributions:')
          for name, contrib in snapshot.sub_score_contributions.items():
              print(f'  {name}: {contrib:.4f}')

          print(f'\\nDominant factors: {snapshot.dominant_factors}')
          print(f'Regime rationale: {snapshot.regime_rationale}')

          print('\\nExplainability - VERIFIED')
          "

      - name: Validate missing data handling
        run: |
          echo "Verifying graceful missing data handling..."
          python -c "
          from risk_engine.heuristic import compute_risk_score

          # Test with minimal features (many missing)
          snapshot = compute_risk_score(
              numeric_features={
                  'realized_volatility_20d': 0.20,
              },
          )

          print(f'With minimal features:')
          print(f'  Risk score: {snapshot.risk_score}')
          print(f'  Regime: {snapshot.regime}')
          print(f'  Warnings: {snapshot.warnings}')

          # Test with no features
          empty_snapshot = compute_risk_score()
          print(f'\\nWith no features:')
          print(f'  Risk score: {empty_snapshot.risk_score}')
          print(f'  Regime: {empty_snapshot.regime}')
          print(f'  Warnings: {empty_snapshot.warnings}')

          assert empty_snapshot.risk_score is None, 'Empty input should return None score'
          print('\\nMissing data handling - VERIFIED')
          "

      - name: Validate spec compliance
        run: |
          echo "Verifying risk_score.yaml compliance..."
          python -c "
          from risk_engine.heuristic.validate import (
              load_risk_spec,
              REGIME_BANDS,
              REQUIRED_SUB_SCORES,
              ALL_VALID_FEATURES,
          )

          # Load spec
          spec = load_risk_spec()
          print(f'Spec version: {spec.get(\"schema_version\")}')

          # Verify regime bands match spec
          spec_bands = spec.get('output', {}).get('regime_classification', {}).get('bands', [])
          print(f'\\nSpec regime bands: {len(spec_bands)}')
          print(f'Engine regime bands: {len(REGIME_BANDS)}')

          # Verify sub-scores match spec
          spec_sub = spec.get('calculation', {}).get('sub_scores', {})
          print(f'\\nSpec sub-scores: {list(spec_sub.keys())}')
          print(f'Engine sub-scores: {REQUIRED_SUB_SCORES}')

          # Verify all features are valid Phase 3 outputs
          print(f'\\nValid features: {len(ALL_VALID_FEATURES)}')

          print('\\nSpec compliance - VERIFIED')
          "


            "data-ingestion/adapters/macro_rates/__init__.py"
            "data-ingestion/adapters/financial_news/__init__.py"
            "data-ingestion/alignment/__init__.py"
            "data-ingestion/alignment/forward_fill.py"
            "data-ingestion/schemas/__init__.py"
            "feature_services/numeric/__init__.py"
            "feature_services/numeric/service.py"
            "feature_services/numeric/windows.py"
            "feature_services/numeric/volatility.py"
            "feature_services/numeric/drawdown.py"
            "feature_services/numeric/liquidity.py"
            "feature_services/numeric/validate.py"
            "feature_services/sentiment/__init__.py"
            "feature_services/sentiment/service.py"
            "feature_services/sentiment/inference.py"
            "feature_services/sentiment/aggregation.py"
            "feature_services/sentiment/mapping.py"
            "feature_services/sentiment/validate.py"
            "feature_services/graph/__init__.py"
            "feature_services/graph/service.py"
            "feature_services/graph/returns.py"
            "feature_services/graph/correlation.py"
            "feature_services/graph/network.py"
            "feature_services/graph/validate.py"
            "risk_engine/__init__.py"
            "risk_engine/heuristic/__init__.py"
            "risk_engine/heuristic/service.py"
            "risk_engine/heuristic/normalization.py"
            "risk_engine/heuristic/weights.py"
            "risk_engine/heuristic/subscores.py"
            "risk_engine/heuristic/explain.py"
            "risk_engine/heuristic/validate.py"
            "risk_engine/ml/__init__.py"
            "risk_engine/ml/config.py"
            "risk_engine/ml/dataset.py"
            "risk_engine/ml/models.py"
            "risk_engine/ml/train.py"
            "risk_engine/ml/evaluate.py"
            "risk_engine/ml/explain.py"
            "risk_engine/ml/validate.py"
          )
          
          missing=0
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✓ $file exists"
            else
              echo "  ✗ $file is missing"
              missing=1
            fi
          done
          
          if [ $missing -eq 1 ]; then
            echo "Repository structure validation failed."

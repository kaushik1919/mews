          trained = train_model(ModelType.RIDGE, dataset, verbose=False)

          print(f'Model type: {trained.model_type.value}')
          print(f'Train accuracy: {trained.training_metrics.train_accuracy:.4f}')
          print(f'Val accuracy: {trained.training_metrics.val_accuracy:.4f}')
          print(f'Version: {trained.version}')

          # Verify risk scores are in [0, 1]
          risk_scores = trained.predict_risk_score(dataset.test.X)
          assert np.all(risk_scores >= 0) and np.all(risk_scores <= 1), 'Scores out of range'

          print(f'\\nRisk score range: [{risk_scores.min():.4f}, {risk_scores.max():.4f}]')
          print('Mock training job - VERIFIED')
          "

      - name: Validate deterministic training

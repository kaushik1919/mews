      - name: Validate no future data usage
        run: |
          echo "Verifying no lookahead bias in graph features..."
          python -c "
          import pandas as pd
          import numpy as np

          from feature_services.graph import compute_graph_features

          np.random.seed(42)

          # Create price data spanning past and future
          as_of = pd.Timestamp('2024-01-15 21:00:00', tz='UTC')
          n_assets = 10

          # Past dates (should be used)
          past_dates = pd.date_range(end=as_of, periods=30, freq='D')
          # Future dates (should NOT be used)
          future_dates = pd.date_range(start=as_of + pd.Timedelta(days=1), periods=10, freq='D')

          all_dates = past_dates.append(future_dates)
          tickers = [f'ASSET_{i}' for i in range(n_assets)]

          # Generate prices for all dates
          np.random.seed(42)
          returns = np.random.randn(len(all_dates), n_assets) * 0.02
